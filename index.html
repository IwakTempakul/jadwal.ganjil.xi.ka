function handleTap(e) {
  if(e.target.closest('#zoomControls') || e.target.closest('#btnAudio') || e.target.closest('#overlay')) return;

  const tapLength = currentTime - lastTap;

  if(tapLength < 500 && tapLength > 0) { clickCount++; } else { clickCount = 1; }
  lastTap = currentTime;

  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => {
    if(clickCount === 2) showPelajaranSaatIni();
    else if(clickCount === 3) showPelajaranSelanjutnya();
    else if(clickCount === 4) showPelajaranSebelumnya();
    else if(clickCount === 5) showJamPulang();
    else if(clickCount === 7) showWaliKelas();

function showOverlay(html) {
  document.getElementById('overlayContent').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
  clearTimeout(overlayTimer);
  overlayTimer = setTimeout(hideOverlay, 7000);
}
function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
  clearTimeout(overlayTimer);
}

function getMapelDetailAtTime(hari, minutes) {
  const jadwal = dataJadwal[hari]; if(!jadwal) return null;
  for(let i = 1; i < jadwal.length; i++) {
    const row = jadwal[i]; const [start, end] = row[0].split(' - ');
    const startMin = timeToMinutes(start); const endMin = timeToMinutes(end);
    if(minutes >= startMin && minutes < endMin) return {mapel: row[1], guru: row[2]};
  }
  return null;
}
function getMapelSelanjutnya(hari, minutes) {
  const jadwal = dataJadwal[hari]; if(!jadwal) return null;
  for(let i = 1; i < jadwal.length; i++) {
    const row = jadwal[i]; const [start] = row[0].split(' - ');
    if(timeToMinutes(start) > minutes) return {mapel: row[1], guru: row[2]};
  }
  return null;
}
function getMapelSebelumnya(hari, minutes) {
  const jadwal = dataJadwal[hari]; if(!jadwal) return null;
  let mapelTerakhir = null;
  for(let i = 1; i < jadwal.length; i++) {
    const row = jadwal[i]; const [start] = row[0].split(' - ');
    if(timeToMinutes(start) < minutes) mapelTerakhir = {mapel: row[1], guru: row[2]}; else break;
  }
  return mapelTerakhir;
}
function getJamPulang(hari) {
  const jadwal = dataJadwal[hari]; if(!jadwal) return "-";
  for(let i = jadwal.length-1; i>=1; i--) {
    if(jadwal[i][1].toLowerCase().includes("pulang")) {
      return jadwal[i][0].split(' - ')[0];
    }
  }
  return "-";
}

function showPelajaranSaatIni() {
  zoomFitLayar(); // AUTO ZOOM FIT
  const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000); const today = new Date(utc + (3600000 * 8));
  const hariArr = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"]; const namaHari = hariArr[today.getDay()];
  const currentMinutes = today.getHours() * 60 + today.getMinutes();
  const data = getMapelDetailAtTime(namaHari, currentMinutes);
  if(!data) {showOverlay(`<div class="overlay-subject">Saat Ini:</div><div class="overlay-teacher">Di luar jam pelajaran</div>`); return;}
  const guruText = data.guru? `(${data.guru})` : "";
  showOverlay(`<div class="overlay-subject">Saat Ini:</div><div class="overlay-teacher">${data.mapel}</div><div class="overlay-teacher">${guruText}</div>`);
}
