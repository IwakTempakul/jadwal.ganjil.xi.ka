,"Fatresia, S.Pd"],["12.20 - 13.00","Istirahat",""],["13.00 - 13.35","Mapel Pilihan","Widya Fismadita A,S.ST"],["13.35 - 14.10","Mapel Pilihan","Widya Fismadita A,S.ST"],["14.10 - 14.45","Mapel Pilihan","Widya Fismadita A,S.ST"],["14.45 - 15.15","Pulang",""]], "Kamis": [["Waktu","Mapel","Pengajar"],["07.15 - 08.00","Matematika","Didik Winarsih, S.Pd"],["08.00 - 08.35","Matematika","Didik Winarsih, S.Pd"],["08.35 - 09.10","Matematika","Didik Winarsih, S.Pd"],["09.10 - 09.45","Bahasa Inggris","Guritno Aditya Warman, S.Pd"],["09.45 - 10.00","Istirahat",""],["10.00 - 10.35","Bahasa Inggris","Guritno Aditya Warman, S.Pd"],["10.35 - 11.10","Bahasa Inggris","Guritno Aditya Warman, S.Pd"],["11.10 - 11.45","KIK","Fatresia, S.Pd"],["11.45 - 12.20","KIK","Fatresia, S.Pd"],["12.20 - 13.00","Istirahat",""],["13.00 - 13.35","KIK","Fatresia, S.Pd"],["13.35 - 14.10","KIK","Fatresia, S.Pd"],["14.10 - 14.45","KIK","Fatresia, S.Pd"],["14.45 - 15.15","Pulang",""]], "Jumat": [["Waktu","Mapel","Pengajar"],["07.00 - 08.00","Kegiatan Jumat Sehat","Pembina Jumat Sehat"],["08.00 - 08.35","Titrimetri dan Gravimetri","Eko Jayanti, S.Pd"],["08.35 - 09.10","Titrimetri dan Gravimetri","Eko Jayanti, S.Pd"],["09.10 - 09.45","Titrimetri dan Gravimetri","Eko Jayanti, S.Pd"],["09.45 - 10.00","Istirahat",""],["10.00 - 10.35","Titrimetri dan Gravimetri","Eko Jayanti, S.Pd"],["10.35 - 11.10","Titrimetri dan Gravimetri","Eko Jayanti, S.Pd"],["11.10 - 11.40","Pulang",""]] };

let lastMapel = ""; function timeToMinutes(t){const [h,m]=t.split('.').map(Number);return h*60+m;}
function getMapelAtTime(hari,minutes){ const jadwal=dataJadwal[hari]; if(!jadwal) return null; for(let i=1;i<jadwal.length;i++){const [s,e]=jadwal[i][0].split(' - '); if(minutes>=timeToMinutes(s)&&minutes<timeToMinutes(e)) return jadwal[i][1];} return null; }
function checkNotification(){ if(!audioEnabled) return; const now=new Date(); const utc=now.getTime()+(now.getTimezoneOffset()*60000); const today=new Date(utc+(3600000*8)); const hariArr=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"]; const namaHari=hariArr[today.getDay()]; const cm=today.getHours()*60+today.getMinutes(); const ms=getMapelAtTime(namaHari,cm); const m1=getMapelAtTime(namaHari,cm-1); if(ms&&ms!==m1&&ms!==lastMapel){lastMapel=ms; if(ms==="Istirahat")playJapaneseBreakBell(); else if(ms==="Pulang")playJapaneseHomeBell(); else playJapaneseEnterBell();} if(today.getHours()===0&&today.getMinutes()===0)lastMapel=""; }
function drawText(text,x,y,fontSize,align='center',bold=false,color='#000',baseline='top'){ ctx.font=`${bold?'bold':'normal'} ${fontSize}px "Segoe UI", Arial`; ctx.fillStyle=color; ctx.textAlign=align; ctx.textBaseline=baseline; ctx.fillText(text,x,y); }

let food = null; let particles = [];

function getCanvasPos(e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX / dpr / scaleFactor;
    const y = (e.clientY - rect.top) * scaleY / dpr / scaleFactor;
    return {x, y};
}

canvas.addEventListener('click', (e) => {
    const pos = getCanvasPos(e);
    food = {x: pos.x, y: pos.y, eaten: false, r: 4};
});

class Particle{ constructor(x,y){ this.x=x; this.y=y; this.vx=(Math.random()-0.5)*3; this.vy=(Math.random()-0.5)*3; this.life=30; }
    update(){ this.x+=this.vx; this.y+=this.vy; this.life--; this.vy+=0.1; }
    draw(){ ctx.strokeStyle=`rgba(0,0,0,${this.life/30})`; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(this.x,this.y,2,0,Math.PI*2); ctx.stroke(); }
}
// IKAN PAKAI SVG - BISA GEDE KECIL + ADA LABEL + WARNA BEDA
class FishSVG{
    constructor(startX,startY,speed,size,delay,id,name,stroke,fill){
        this.x=startX; this.y=startY; this.startSpeed=speed; this.baseSize=size;
        this.currentSize=size; this.eatCount=0;
        this.maxSize=350; this.maxEats=1000;
        this.angle=0; this.wiggle=0; this.delay=delay; this.started=false; this.entered=false;
        this.vx=speed; this.vy=(Math.random()-0.5)*0.5; this.targetVx=speed; this.targetVy=0;
        this.id=id; this.name=name; this.stroke=stroke; this.fill=fill;

        this.g = document.createElementNS("http://www.w3.org/2000/svg","g");
        this.label = document.createElementNS("http://www.w3.org/2000/svg","text");
        this.label.setAttribute("font-family", "Segoe UI, Arial");
        this.label.setAttribute("font-size", "12");
        this.label.setAttribute("font-weight", "bold");
        this.label.setAttribute("text-anchor", "middle");
        this.label.setAttribute("fill", "#000");
        this.label.textContent = this.name;
        svg.appendChild(this.g);
        svg.appendChild(this.label);
    }

    grow(){
        this.eatCount++;
        let progress = this.eatCount / this.maxEats;
        if(progress > 1) progress = 1;
        this.currentSize = this.baseSize + (this.maxSize - this.baseSize) * Math.sqrt(progress);
        this.label.setAttribute("font-size", 10 + this.currentSize/20);
    }

    update(time){
        if(time<this.delay)return;
        this.started=true;
        if(!this.entered){
            this.x+=this.startSpeed;
            if(this.x>50){ this.entered=true; }
        } else {
            if(food &&!food.eaten){
                let dx=food.x-this.x;
                let dy=food.y-this.y;
                let dist=Math.sqrt(dx*dx+dy*dy);
                if(dist<food.r+this.currentSize/2){
                    food.eaten=true;
                    this.grow();
                    for(let i=0;i<8;i++) particles.push(new Particle(food.x, food.y));
                }
                this.targetVx=dx/dist*2;
                this.targetVy=dy/dist*2;
            } else {
                this.targetVx+=(Math.random()-0.5)*0.15;
                this.targetVy+=(Math.random()-0.5)*0.15;
                let speed=Math.sqrt(this.targetVx*this.targetVx+this.targetVy*this.targetVy);
                if(speed>1.5){this.targetVx=this.targetVx/speed*1.5; this.targetVy=this.targetVy/speed*1.5;}
            }
            this.vx += (this.targetVx - this.vx) * 0.1;
            this.vy += (this.targetVy - this.vy) * 0.1;
            this.x+=this.vx;
            this.y+=this.vy;

            if(this.x<this.currentSize) {this.x=this.currentSize; this.vx*=-0.8;}
            if(this.x>slideWidth-this.currentSize) {this.x=slideWidth-this.currentSize; this.vx*=-0.8;}
            if(this.y<this.currentSize) {this.y=this.currentSize; this.vy*=-0.8;}
            if(this.y>slideHeight-this.currentSize) {this.y=slideHeight-this.currentSize; this.vy*=-0.8;}
        }
        this.wiggle+=0.25;
        this.angle=Math.atan2(this.vy,this.vx)*180/Math.PI;
        this.draw();
    }

    draw(){
        if(!this.started) return;
        const s = this.currentSize * 0.5;
        const tailWiggle = Math.sin(this.wiggle*2.2)*9;
        const pectoralWiggle = Math.sin(this.wiggle*3.5)*3;

        this.g.setAttribute("transform", `translate(${this.x},${this.y}) rotate(${this.angle})`);
        this.g.innerHTML = `
        <g stroke="${this.stroke}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="0" cy="0" rx="${s*1.2}" ry="${s}" fill="${this.fill}"/>
            ${[-4,-2,0,2,4].map(i=>`<path d="M${-s*0.6},${i} Q0,${i-1.5} ${s*0.5},${i}" fill="none"/>`).join('')}
            <circle cx="${s/2}" cy="${-s/3}" r="2" fill="${this.fill}"/>
            <circle cx="${s/2}" cy="${s/3}" r="2" fill="${this.fill}"/>
            <circle cx="${s/2+0.5}" cy="${-s/3-0.5}" r="0.6" fill="#fff" stroke="none"/>
            <circle cx="${s/2+0.5}" cy="${s/3-0.5}" r="0.6" fill="#fff" stroke="none"/>
            <path d="M${-s*0.8},${tailWiggle} Q${-s*1.1},${tailWiggle} ${-s*1.4},${tailWiggle-8} Q${-s*1.2},${tailWiggle} ${-s*1.4},${tailWiggle+8} Q${-s*1.1},${tailWiggle} ${-s*0.8},${tailWiggle}" fill="${this.fill}"/>
            <ellipse cx="${s/4}" cy="${-s/1.8 + pectoralWiggle}" rx="4" ry="7" fill="${this.fill}" transform="rotate(${pectoralWiggle*0.1} ${s/4} ${-s/1.8 + pectoralWiggle})"/>
            <ellipse cx="${s/4}" cy="${s/1.8 + pectoralWiggle}" rx="4" ry="7" fill="${this.fill}" transform="rotate(${-pectoralWiggle*0.1} ${s/4} ${s/1.8 + pectoralWiggle})"/>
        </g>`;

        this.label.setAttribute("x", this.x);
        this.label.setAttribute("y", this.y - this.currentSize - 15);
    }
}

function drawEffects(){
    if(food &&!food.eaten){
        ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(food.x, food.y, food.r, 0, Math.PI*2); ctx.fill();
    }
    if(food && food.eaten) food=null;
    particles = particles.filter(p => p.life > 0); particles.forEach(p => { p.update(); p.draw(); });
}

function drawTable(hari,startX,startY,tableWidth){
    const jadwalAsli=dataJadwal[hari]; const jadwal=jadwalAsli.filter(row=>row[1]!=="Pulang");
    const rowHeight=22; const colWidths=[75,tableWidth-75-140,140];
    drawText(hari,startX,startY-22,14,'left',true,'#000','top'); ctx.fillStyle='#d9d9d9';ctx.fillRect(startX,startY,tableWidth,rowHeight);
    let hasPJOK=false,hasKIK=false,hasTitrimetri=false,hasMapelPilihan=false;
    for(let i=0;i<jadwal.length;i++){ let y=startY+i*rowHeight;let row=jadwal[i];let x=startX; if(row[1]==="PJOK")hasPJOK=true; if(row[1]==="KIK")hasKIK=true; if(row[1]==="Titrimetri dan Gravimetri")hasTitrimetri=true; if(row[1]==="Mapel Pilihan")hasMapelPilihan=true;
        if(row[0].includes("Istirahat")){ctx.fillStyle='#000';ctx.fillRect(startX,y,tableWidth,rowHeight);ctx.fillStyle='#fff';}else{ctx.fillStyle='#000';}
        ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.strokeRect(startX,y,tableWidth,rowHeight);
        ctx.beginPath();ctx.moveTo(x+colWidths[0],y);ctx.lineTo(x+colWidths[0],y+rowHeight);ctx.moveTo(x+colWidths[0]+colWidths[1],y);ctx.lineTo(x+colWidths[0]+colWidths[1],y+rowHeight);ctx.stroke();
        let isHeader=i===0;let fontSize=isHeader?11:10;let bold=isHeader;let yCenter=y+rowHeight/2;
        drawText(row[0],x+colWidths[0]/2,yCenter,fontSize,'center',bold,'#000','middle'); drawText(row[1],x+colWidths[0]+5,yCenter,fontSize,'left',bold,'#000','middle'); drawText(row[2],x+colWidths[0]+colWidths[1]+5,yCenter,fontSize,'left',bold,'#000','middle');
    }
    let noteY=startY+jadwal.length*rowHeight+5;
    if(hasPJOK){drawText("PJOK = Pendidikan Jasmani, Olahraga, dan Kesehatan",startX,noteY,9,'left',false,'#333','top');noteY+=14;}
    if(hasKIK){drawText("KIK = Kreativitas, Inovasi, dan Kewirausahaan",startX,noteY,9,'left',false,'#333','top');noteY+=14;}
    if(hasTitrimetri){drawText("Titrimetri dan Gravimetri = Analisis Titrimetri dan Gravimetri",startX,noteY,9,'left',false,'#333','top');noteY+=14;}
    if(hasMapelPilihan){drawText("Mapel Pilihan = Analisis Batu Bara",startX,noteY,9,'left',false,'#333','top');}
}

    const currentTime=Date.now()-startTime;
    ctx.fillStyle='#fefcf3';ctx.fillRect(0,0,slideWidth,slideHeight);

    const now=new Date(); const utc=now.getTime()+(now.getTimezoneOffset()*60000); const today=new Date(utc+(3600000*8));
    const hariArr=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"]; const bulanArr=["JANUARI","FEBRUARI","MARET","APRIL","MEI","JUNI","JULI","AGUSTUS","SEPTEMBER","OKTOBER","NOVEMBER","DESEMBER"];
    const namaHari=hariArr[today.getDay()];const tanggal=today.getDate();const namaBulan=bulanArr[today.getMonth()];
    const currentMinutes=today.getHours()*60+today.getMinutes(); const mapelSekarang=getMapelAtTime(namaHari,currentMinutes)||"Di luar jam pelajaran";
    const boxH=100;const calW=120;const calX=slideWidth/2-calW/2-285;const calY=20;
    ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.strokeRect(calX,calY,calW,boxH);ctx.fillStyle='#000';ctx.fillRect(calX,calY,calW,25);
    drawText(namaBulan,calX+calW/2,calY+4,14,'center',true,'#fff','top'); ctx.setLineDash([2,2]);ctx.beginPath();ctx.moveTo(calX+5,calY+25);ctx.lineTo(calX+calW-5,calY+25);ctx.stroke();ctx.setLineDash([]);
    drawText(tanggal,calX+calW/2,calY+38,40,'center',true,'#000','top'); drawText(namaHari.toUpperCase(),calX+calW/2,calY+82,14,'center',true,'#000','top');
    const clockW=175;const clockX=calX+calW+25;const clockY=calY; ctx.strokeRect(clockX,clockY,clockW,boxH);ctx.fillRect(clockX,clockY,clockW,25);
    drawText("WAKTU",clockX+clockW/2,clockY+4,14,'center',true,'#fff','top'); const hours=String(today.getHours()).padStart(2,'0');const minutes=String(today.getMinutes()).padStart(2,'0');const seconds=String(today.getSeconds()).padStart(2,'0');
    drawText(`${hours}:${minutes}:${seconds}`,clockX+clockW/2,clockY+38,40,'center',true,'#000','top'); drawText("WITA",clockX+clockW/2,clockY+82,14,'center',true,'#000','top');
